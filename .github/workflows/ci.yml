name: VigiliaFocus CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Lint Check
        run: ./gradlew :androidApp:lintDebug --stacktrace

      - name: Unit Tests
        run: ./gradlew :androidApp:testDebugUnitTest --stacktrace

      # Enable KVM (Hardware Acceleration) so the emulator doesn't choke on software rendering.
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: UI Tests (Instrumentation)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86 # Use x86 (32-bit), NOT x86_64, for faster headless booting
          profile: Nexus 6
          emulator-boot-timeout: 600
          disable-animations: true
          # Aggressively strip emulator overhead
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          script: ./gradlew :composeApp:connectedAndroidDeviceTest --stacktrace

      - name: Build Debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace