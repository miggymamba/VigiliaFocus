name: VigiliaFocus CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Lint Check
        run: ./gradlew lintDebug --stacktrace

      - name: Unit Tests (Domain & Presentation)
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: UI Tests (Instrumentation)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # Bumped to 34: Most stable ARM64 image for Apple Silicon runners
          api-level: 34
          target: google_apis
          arch: aarch64
          emulator-boot-timeout: 600
          disable-animations: true
          script: ./gradlew :composeApp:connectedAndroidDeviceTest --stacktrace

      - name: Build Debug APK
        run: ./gradlew :androidApp:assembleDebug --stacktrace