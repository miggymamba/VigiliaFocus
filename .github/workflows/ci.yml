name: VigiliаFocus CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Lint Check
        run: ./gradlew :androidApp:lintDebug --stacktrace

      - name: Unit Tests
        # commonTest compiled via Android target — avoids iOS/Xcode dependency on Ubuntu
        run: ./gradlew :androidApp:testDebugUnitTest --stacktrace

      - name: Build Debug APK
        # Ensures full KMP compilation including commonMain + androidMain actuals.
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      # TODO: VF4.S7 — Add instrumented UI tests step here using
      # reactivecircus/android-emulator-runner@v2 once ComposeTestRule
      # tests are implemented. Mirror VindexWeather CI setup (api-level 29,
      # x86_64, connectedDebugAndroidTest).