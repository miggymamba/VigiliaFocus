name: VigiliаFocus CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Lint Check
        run: ./gradlew :androidApp:lintDebug --stacktrace

      - name: Unit Tests
        # commonTest compiled via Android target — avoids iOS/Xcode dependency on Ubuntu
        run: ./gradlew :androidApp:testDebugUnitTest --stacktrace

      - name: Build Debug APK
        # Ensures full KMP compilation including commonMain + androidMain actuals.
        run: ./gradlew :androidApp:assembleDebug --stacktrace

      - name: UI Tests (Instrumentation)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-boot-timeout: 600 # Keep this to prevent infinite hangs
          # Since we pre-built, this command just installs and runs
          script: ./gradlew :composeApp:connectedAndroidDeviceTest --stacktrace